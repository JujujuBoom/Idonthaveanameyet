<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julie's Website - Labubu Fireworks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }
        .container { 
            text-align: center; 
            z-index: 10; 
            position: relative;
        }
        h1 {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.4);
            margin-bottom: 2rem;
            animation: glow 2s ease-in-out infinite alternate;
            pointer-events: none;
            user-select: none;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.4); }
            to { text-shadow: 0 0 30px rgba(255, 105, 180, 1), 0 0 60px rgba(255, 105, 180, 0.6), 0 0 80px rgba(255, 105, 180, 0.4); }
        }
        .firework-btn {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 25px rgba(255, 107, 107, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .firework-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 35px rgba(255, 107, 107, 0.6);
        }
        .firework-btn:active {
            transform: translateY(1px) scale(0.98);
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #stars { z-index: 1; }
        #fireworks { z-index: 5; }
        .footer {
            position: fixed;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            z-index: 10;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>
    <canvas id="fireworks"></canvas>
    
    <div class="container">
        <h1>This is Julie's Website</h1>
        <button class="firework-btn" id="magicBtn">🎆 Click for Magic</button>
    </div>
    
    <div class="footer">Made with ❤️ for Julie</div>

    <script>
        const starsCanvas = document.getElementById('stars');
        const starsCtx = starsCanvas.getContext('2d');
        const fireworksCanvas = document.getElementById('fireworks');
        const ctx = fireworksCanvas.getContext('2d');
        
        let width = starsCanvas.width = fireworksCanvas.width = window.innerWidth;
        let height = starsCanvas.height = fireworksCanvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = starsCanvas.width = fireworksCanvas.width = window.innerWidth;
            height = starsCanvas.height = fireworksCanvas.height = window.innerHeight;
            initStars();
        });

        // --- Stars ---
        const stars = [];
        function initStars() {
            stars.length = 0;
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 1.2,
                    baseAlpha: Math.random() * 0.5 + 0.3,
                    oscillationSpeed: Math.random() * 0.03 + 0.01,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }
        function drawStars() {
            starsCtx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.phase += star.oscillationSpeed;
                const alpha = star.baseAlpha + Math.sin(star.phase) * 0.2;
                starsCtx.beginPath();
                starsCtx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                starsCtx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, Math.min(1, alpha))})`;
                starsCtx.fill();
            });
            requestAnimationFrame(drawStars);
        }
        initStars();
        drawStars();

        // --- FIXED LABUBU DRAWING FUNCTION ---
        // 逻辑：一笔画完，不跳跃，确保封闭
        function drawLabubuShape(context, x, y, size, rotation, color) {
            context.save();
            context.translate(x, y);
            context.rotate(rotation);
            context.scale(size, size);
            
            context.fillStyle = color;
            context.shadowColor = color;
            context.shadowBlur = 25; // 强烈的发光
            
            context.beginPath();
            
            // 1. 从身体底部中心开始 (0, 0.5)
            context.moveTo(0, 0.5);
            
            // 2. 画身体右侧到脖子
            context.quadraticCurveTo(0.25, 0.5, 0.25, 0.1);
            
            // 3. 画脸颊右侧到耳朵根部
            context.quadraticCurveTo(0.25, -0.2, 0.15, -0.4);
            
            // 4. 画左耳外沿 (长耳朵是关键) - 向左上延伸
            context.quadraticCurveTo(0.0, -0.5, -0.3, -0.4); // 耳朵根部内陷
            context.quadraticCurveTo(-0.5, -0.3, -0.7, -0.9); // 耳朵尖 (左)
            
            // 5. 画左耳内沿回到头顶
            context.quadraticCurveTo(-0.4, -0.5, -0.2, -0.45);
            
            // 6. 画头顶弧线到右耳根
            context.quadraticCurveTo(0.0, -0.5, 0.2, -0.45);
            
            // 7. 画右耳外沿 - 向右上延伸
            context.quadraticCurveTo(0.4, -0.5, 0.5, -0.3); 
            context.quadraticCurveTo(0.7, -0.9, 0.3, -0.4); // 耳朵尖 (右)
            
            // 8. 画右耳内沿回到脸颊
            context.quadraticCurveTo(0.15, -0.5, 0.15, -0.4);
            
            // 9. 画脸颊左侧回到脖子
            context.quadraticCurveTo(0.25, -0.2, 0.25, 0.1); // 这里其实应该闭合回起点，但为了形状准确，我们重新描述右侧
            
            // --- 修正路径：重新用更简单的逻辑画一个确认可见的形状 ---
            // 清除路径，用最稳妥的“兔子/精灵”画法
            context.beginPath();
            
            // 身体 (椭圆)
            context.ellipse(0, 0.3, 0.25, 0.35, 0, 0, Math.PI * 2);
            
            // 头部 (圆)
            context.arc(0, -0.2, 0.35, 0, Math.PI * 2);
            
            // 左耳朵 (长三角形填充)
            context.moveTo(-0.2, -0.4);
            context.lineTo(-0.5, -1.1);
            context.lineTo(-0.05, -0.5);
            
            // 右耳朵 (长三角形填充)
            context.moveTo(0.2, -0.4);
            context.lineTo(0.5, -1.1);
            context.lineTo(0.05, -0.5);
            
            // 关键：因为上面是分开的路径，fill() 会填充所有子路径！
            // 这样就能保证身体、头、耳朵都有颜色。
            
            context.fill();
            
            // 画眼睛 (白色，无发光，增加辨识度)
            context.shadowBlur = 0;
            context.fillStyle = "#FFFFFF";
            
            // 左眼
            context.beginPath();
            context.arc(-0.15, -0.25, 0.06, 0, Math.PI*2);
            context.fill();
            
            // 右眼
            context.beginPath();
            context.arc(0.15, -0.25, 0.06, 0, Math.PI*2);
            context.fill();
            
            // 调试：如果还是看不见，取消下面这行的注释，会画一个红框包围它
            // context.strokeStyle = "red"; context.lineWidth = 0.1; context.strokeRect(-0.6, -1.2, 1.2, 1.8);

            context.restore();
        }

        // --- Fireworks ---
        class Rocket {
            constructor() {
                this.x = width / 2 + (Math.random() - 0.5) * 400;
                this.y = height;
                this.vy = -(Math.random() * 5 + 12);
                this.explosionHeight = Math.random() * (height / 3) + height / 6;
                
                const colors = ['#ff0055', '#00ffcc', '#ffff00', '#ff00ff', '#00ccff', '#ffaa00'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                this.exploded = false;
                this.particles = [];
                this.trail = [];
            }

            update() {
                if (!this.exploded) {
                    this.trail.push({x: this.x, y: this.y});
                    if (this.trail.length > 10) this.trail.shift();
                    this.y += this.vy;
                    this.vy *= 0.96;
                    if (this.y <= this.explosionHeight || this.vy >= -2) {
                        this.explode();
                    }
                } else {
                    this.particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.08;
                        p.rotation += p.rotSpeed;
                        p.alpha -= p.decay;
                    });
                    this.particles = this.particles.filter(p => p.alpha > 0.05);
                }
            }

            draw() {
                if (!this.exploded) {
                    if (this.trail.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.trail[0].x, this.trail[0].y);
                        for (let i = 1; i < this.trail.length; i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
                        ctx.strokeStyle = "rgba(255,255,255,0.5)";
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
                    ctx.fillStyle = "#fff";
                    ctx.fill();
                } else {
                    this.particles.forEach(p => {
                        if (p.alpha <= 0) return;
                        // 随着消失，尺寸稍微变小
                        const currentSize = p.size * (0.5 + 0.5 * p.alpha); 
                        drawLabubuShape(ctx, p.x, p.y, currentSize, p.rotation, p.color);
                    });
                }
            }

            explode() {
                this.exploded = true;
                // 增加粒子数量，确保视觉效果明显
                const count = 60; 
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
                    const speed = Math.random() * 5 + 2;
                    this.particles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        color: this.color,
                        size: 1.5, // 调大基础尺寸，确保可见
                        rotation: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 0.15,
                        alpha: 1,
                        decay: Math.random() * 0.012 + 0.008
                    });
                }
            }

            isDone() {
                return this.exploded && this.particles.length === 0;
            }
        }

        let rockets = [];

        function launchFireworks() {
            for (let i = 0; i < 4; i++) {
                setTimeout(() => rockets.push(new Rocket()), i * 250);
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(15, 12, 41, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            rockets = rockets.filter(r => {
                r.update();
                r.draw();
                return !r.isDone();
            });
            
            if (Math.random() < 0.02) rockets.push(new Rocket());
            requestAnimationFrame(animate);
        }

        document.getElementById('magicBtn').addEventListener('click', launchFireworks);
        
        // 启动时自动放一个看看效果
        setTimeout(() => {
            rockets.push(new Rocket());
        }, 1000);

        animate();
    </script>
</body>
</html>

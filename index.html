<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julie's Website</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 20px;
            z-index: 1; /* Above canvas */
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            z-index: 1; /* Above canvas */
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>This is Julie's website</h1>
    <button onclick="launchFireworks()">Launch Fireworks</button>
    <canvas id="starsCanvas"></canvas>
    <canvas id="fireworksCanvas"></canvas>

    <script>
        // Starry sky
        const starsCanvas = document.getElementById('starsCanvas');
        const starsCtx = starsCanvas.getContext('2d');
        starsCanvas.width = window.innerWidth;
        starsCanvas.height = window.innerHeight;

        function drawStars() {
            starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * starsCanvas.width;
                const y = Math.random() * starsCanvas.height;
                const radius = Math.random() * 1.5;
                const alpha = Math.random();
                starsCtx.beginPath();
                starsCtx.arc(x, y, radius, 0, Math.PI * 2);
                starsCtx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                starsCtx.fill();
            }
        }
        drawStars(); // Initial draw
        setInterval(drawStars, 2000); // Twinkle every 2 seconds

        // Fireworks
        function launchFireworks() {
            const canvas = document.getElementById('fireworksCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.display = 'block';

            const rockets = []; // Launching rockets
            const particles = []; // Explosion particles
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];

            function createRocket() {
                return {
                    x: canvas.width / 2 + (Math.random() - 0.5) * 100, // Slight spread from center
                    y: canvas.height, // Start at bottom
                    vy: - (Math.random() * 5 + 10), // Upward speed
                    explosionHeight: Math.random() * (canvas.height / 2) + canvas.height / 4, // Burst in upper half
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 300 // Max life to prevent infinite
                };
            }

            function createParticle(x, y, color) {
                return {
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 2, // Slight upward bias for burst
                    color: color,
                    radius: Math.random() * 3 + 1,
                    life: Math.random() * 50 + 50
                };
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw and update rockets
                rockets.forEach((rocket, rIndex) => {
                    ctx.beginPath();
                    ctx.moveTo(rocket.x, rocket.y);
                    ctx.lineTo(rocket.x, rocket.y + 10); // Tail
                    ctx.strokeStyle = rocket.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    rocket.y += rocket.vy;
                    rocket.life--;

                    if (rocket.y <= rocket.explosionHeight || rocket.life <= 0) {
                        // Explode: create burst particles
                        for (let i = 0; i < 50; i++) {
                            particles.push(createParticle(rocket.x, rocket.y, rocket.color));
                        }
                        rockets.splice(rIndex, 1);
                    }
                });

                // Draw and update particles
                particles.forEach((p, pIndex) => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${parseInt(p.color.slice(1,3),16)}, ${parseInt(p.color.slice(3,5),16)}, ${parseInt(p.color.slice(5,7),16)}, ${p.life / 100})`; // Fade out
                    ctx.fill();

                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1; // Gravity
                    p.life--;

                    if (p.life <= 0) {
                        particles.splice(pIndex, 1);
                    }
                });

                // Launch new rockets periodically
                if (Math.random() < 0.1 && rockets.length < 5) { // Up to 5 rockets, random launch
                    rockets.push(createRocket());
                }

                if (rockets.length > 0 || particles.length > 0) {
                    requestAnimationFrame(animate);
                } else {
                    canvas.style.display = 'none';
                }
            }

            // Start with initial rockets
            for (let i = 0; i < 3; i++) {
                rockets.push(createRocket());
            }
            animate();
        }

        window.addEventListener('resize', () => {
            starsCanvas.width = window.innerWidth;
            starsCanvas.height = window.innerHeight;
            drawStars();
            const fireworksCanvas = document.getElementById('fireworksCanvas');
            fireworksCanvas.width = window.innerWidth;
            fireworksCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>

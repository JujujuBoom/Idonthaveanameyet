<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julie's Website - Labubu Fireworks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }
        .container { 
            text-align: center; 
            z-index: 10; 
            position: relative;
        }
        h1 {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.4);
            margin-bottom: 2rem;
            animation: glow 2s ease-in-out infinite alternate;
            pointer-events: none;
            user-select: none;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.4); }
            to { text-shadow: 0 0 30px rgba(255, 105, 180, 1), 0 0 60px rgba(255, 105, 180, 0.6), 0 0 80px rgba(255, 105, 180, 0.4); }
        }
        .firework-btn {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 25px rgba(255, 107, 107, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .firework-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 35px rgba(255, 107, 107, 0.6);
        }
        .firework-btn:active {
            transform: translateY(1px) scale(0.98);
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #stars { z-index: 1; }
        #fireworks { z-index: 5; }
        .footer {
            position: fixed;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            z-index: 10;
            pointer-events: none;
            user-select: none;
        }
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .firework-btn { padding: 0.8rem 2rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>
    <canvas id="fireworks"></canvas>
    
    <div class="container">
        <h1>This is Julie's Website</h1>
        <button class="firework-btn" id="magicBtn">🎆 Click for Magic</button>
    </div>
    
    <div class="footer">Made with ❤️ for Julie</div>

    <script>
        // --- Setup ---
        const starsCanvas = document.getElementById('stars');
        const starsCtx = starsCanvas.getContext('2d');
        const fireworksCanvas = document.getElementById('fireworks');
        const ctx = fireworksCanvas.getContext('2d');
        
        let width = starsCanvas.width = fireworksCanvas.width = window.innerWidth;
        let height = starsCanvas.height = fireworksCanvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = starsCanvas.width = fireworksCanvas.width = window.innerWidth;
            height = starsCanvas.height = fireworksCanvas.height = window.innerHeight;
            initStars();
        });

        // --- Stars Background ---
        const stars = [];
        function initStars() {
            stars.length = 0;
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 1.2,
                    baseAlpha: Math.random() * 0.5 + 0.3,
                    oscillationSpeed: Math.random() * 0.03 + 0.01,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        function drawStars() {
            starsCtx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.phase += star.oscillationSpeed;
                const alpha = star.baseAlpha + Math.sin(star.phase) * 0.2;
                starsCtx.beginPath();
                starsCtx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                starsCtx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, Math.min(1, alpha))})`;
                starsCtx.fill();
            });
            requestAnimationFrame(drawStars);
        }
        
        initStars();
        drawStars();

        // --- FIXED: Robust Labubu Shape Drawing Function ---
        function drawLabubuShape(context, x, y, size, rotation, color) {
            context.save();
            context.translate(x, y);
            context.rotate(rotation);
            context.scale(size, size);
            
            context.fillStyle = color;
            // Strong glow effect
            context.shadowColor = color;
            context.shadowBlur = 20; 
            
            context.beginPath();
            
            // Start from bottom center of body
            context.moveTo(0, 0.6); 
            
            // Right side of body up to neck
            context.bezierCurveTo(0.25, 0.6, 0.35, 0.2, 0.35, 0.0);
            
            // Right side of head
            context.bezierCurveTo(0.35, -0.3, 0.2, -0.5, 0.1, -0.55);
            
            // Right Ear (Long and pointy)
            context.bezierCurveTo(0.3, -0.6, 0.6, -0.8, 0.7, -1.4); // Tip
            context.bezierCurveTo(0.55, -0.9, 0.35, -0.7, 0.25, -0.65); // Inner curve back to head
            
            // Top of head between ears
            context.bezierCurveTo(0.15, -0.65, -0.15, -0.65, -0.25, -0.65);
            
            // Left Ear (Long and pointy)
            context.bezierCurveTo(-0.35, -0.7, -0.55, -0.9, -0.7, -1.4); // Tip
            context.bezierCurveTo(-0.6, -0.8, -0.3, -0.6, -0.1, -0.55); // Inner curve back to head
            
            // Left side of head down to neck
            context.bezierCurveTo(-0.2, -0.5, -0.35, -0.3, -0.35, 0.0);
            
            // Left side of body down to bottom
            context.bezierCurveTo(-0.35, 0.2, -0.25, 0.6, 0, 0.6);
            
            context.closePath();
            context.fill();
            
            // Optional: Add cute eyes (white dots) to make it recognizable
            context.shadowBlur = 0; // Remove glow for eyes so they are sharp
            context.fillStyle = "rgba(255, 255, 255, 0.9)";
            
            // Right Eye
            context.beginPath();
            context.ellipse(0.12, -0.35, 0.06, 0.08, 0.1, 0, Math.PI*2);
            context.fill();
            
            // Left Eye
            context.beginPath();
            context.ellipse(-0.12, -0.35, 0.06, 0.08, -0.1, 0, Math.PI*2);
            context.fill();
            
            context.restore();
        }

        // --- Fireworks System ---
        class Rocket {
            constructor() {
                this.x = width / 2 + (Math.random() - 0.5) * 400;
                this.y = height;
                this.vy = -(Math.random() * 5 + 12);
                this.explosionHeight = Math.random() * (height / 3) + height / 6;
                
                const colors = ['#ff0055', '#00ffcc', '#ffff00', '#ff00ff', '#00ccff', '#ffaa00'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                this.exploded = false;
                this.particles = [];
                this.trail = [];
            }

            update() {
                if (!this.exploded) {
                    this.trail.push({x: this.x, y: this.y});
                    if (this.trail.length > 10) this.trail.shift();
                    
                    this.y += this.vy;
                    this.vy *= 0.96;
                    
                    if (this.y <= this.explosionHeight || this.vy >= -2) {
                        this.explode();
                    }
                } else {
                    this.particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.08;
                        p.rotation += p.rotSpeed;
                        p.alpha -= p.decay;
                        if (Math.random() > 0.8) p.sparkle = Math.random() * 0.5 + 0.5;
                    });
                    this.particles = this.particles.filter(p => p.alpha > 0.05);
                }
            }

            draw() {
                if (!this.exploded) {
                    if (this.trail.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.trail[0].x, this.trail[0].y);
                        for (let i = 1; i < this.trail.length; i++) {
                            ctx.lineTo(this.trail[i].x, this.trail[i].y);
                        }
                        ctx.strokeStyle = `rgba(255, 255, 255, 0.5)`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.shadowColor = '#fff';
                    ctx.shadowBlur = 10;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    this.particles.forEach(p => {
                        if (p.alpha <= 0) return;
                        const currentSize = p.size * p.alpha;
                        drawLabubuShape(ctx, p.x, p.y, currentSize, p.rotation, p.color);
                    });
                }
            }

            explode() {
                this.exploded = true;
                const particleCount = 50; 
                
                for (let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 * i) / particleCount + (Math.random() - 0.5) * 0.5;
                    const speed = Math.random() * 6 + 2;
                    
                    this.particles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        color: this.color,
                        size: Math.random() * 0.8 + 0.5, // Slightly bigger default size
                        rotation: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 0.2,
                        alpha: 1,
                        decay: Math.random() * 0.015 + 0.01,
                        sparkle: 1
                    });
                }
            }

            isDone() {
                return this.exploded && this.particles.length === 0;
            }
        }

        let rockets = [];

        function launchFireworks() {
            const count = Math.floor(Math.random() * 3) + 3;
            for (let i = 0; i < count; i++) {
                setTimeout(() => rockets.push(new Rocket()), i * 200);
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(15, 12, 41, 0.2)'; 
            ctx.fillRect(0, 0, width, height);
            
            rockets = rockets.filter(rocket => {
                rocket.update();
                rocket.draw();
                return !rocket.isDone();
            });
            
            if (Math.random() < 0.02) {
                rockets.push(new Rocket());
            }
            
            requestAnimationFrame(animate);
        }

        document.getElementById('magicBtn').addEventListener('click', launchFireworks);

        setTimeout(() => {
            rockets.push(new Rocket());
            setTimeout(() => rockets.push(new Rocket()), 400);
        }, 1000);

        animate();

    </script>
</body>
</html>

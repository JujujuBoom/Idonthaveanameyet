<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julie's Website - Galaxy & Fireworks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 深邃夜空背景 */
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }
        .container { 
            text-align: center; 
            z-index: 10; 
            position: relative;
        }
        h1 {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 0 40px rgba(100, 200, 255, 0.4);
            margin-bottom: 2rem;
            animation: glow 3s ease-in-out infinite alternate;
            pointer-events: none;
            user-select: none;
            letter-spacing: 2px;
        }
        @keyframes glow {
            from { text-shadow: 0 0 15px rgba(255, 255, 255, 0.5), 0 0 30px rgba(100, 200, 255, 0.3); }
            to { text-shadow: 0 0 25px rgba(255, 255, 255, 0.8), 0 0 50px rgba(100, 200, 255, 0.6), 0 0 70px rgba(255, 255, 255, 0.4); }
        }
        .firework-btn {
            padding: 1rem 3.5rem;
            font-size: 1.3rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 300;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .firework-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.8);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.4), 0 0 80px rgba(100, 200, 255, 0.2);
        }
        .firework-btn:active {
            transform: translateY(1px) scale(0.98);
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #galaxy { z-index: 1; }
        #stars { z-index: 2; }
        #fireworks { z-index: 5; }
        .footer {
            position: fixed;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            z-index: 10;
            pointer-events: none;
            user-select: none;
            letter-spacing: 1px;
        }
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .firework-btn { padding: 0.8rem 2.5rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <!-- 三层Canvas：银河层 -> 星星层 -> 烟花层 -->
    <canvas id="galaxy"></canvas>
    <canvas id="stars"></canvas>
    <canvas id="fireworks"></canvas>
    
    <div class="container">
        <h1>This is Julie's Website</h1>
        <button class="firework-btn" id="magicBtn">✨ Make a Wish</button>
    </div>
    
    <div class="footer">Made with ❤️ for Julie</div>

    <script>
        // --- Setup Canvases ---
        const galaxyCanvas = document.getElementById('galaxy');
        const galaxyCtx = galaxyCanvas.getContext('2d');
        const starsCanvas = document.getElementById('stars');
        const starsCtx = starsCanvas.getContext('2d');
        const fireworksCanvas = document.getElementById('fireworks');
        const ctx = fireworksCanvas.getContext('2d');
        
        let width = galaxyCanvas.width = starsCanvas.width = fireworksCanvas.width = window.innerWidth;
        let height = galaxyCanvas.height = starsCanvas.height = fireworksCanvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = galaxyCanvas.width = starsCanvas.width = fireworksCanvas.width = window.innerWidth;
            height = galaxyCanvas.height = starsCanvas.height = fireworksCanvas.height = window.innerHeight;
            initGalaxy();
            initStars();
        });

        // --- 1. Galaxy Background (Milky Way) ---
        const galaxyParticles = [];
        function initGalaxy() {
            galaxyParticles.length = 0;
            const count = 1500; // 银河星星数量
            for (let i = 0; i < count; i++) {
                // 银河形状：中间宽，两边窄，呈带状分布
                const x = Math.random() * width;
                const centerX = width / 2;
                const distFromCenter = Math.abs(x - centerX);
                const maxDist = width * 0.8;
                
                // 越靠近中心，Y轴分布越集中；越远越分散，形成带状
                const spread = (distFromCenter / maxDist) * (height * 0.4) + 50;
                const centerY = height / 2 + Math.sin((x / width) * Math.PI * 2) * 50; // 轻微弯曲
                
                const y = centerY + (Math.random() - 0.5) * spread;
                
                // 只有落在带内的才保留，形成银河形状
                if (Math.abs(y - centerY) < spread / 2) {
                    galaxyParticles.push({
                        x: x,
                        y: y,
                        size: Math.random() * 1.2,
                        alpha: Math.random() * 0.4 + 0.1, // 比较暗淡
                        color: `rgba(${200 + Math.random()*55}, ${200 + Math.random()*55}, 255,`
                    });
                }
            }
        }

        function drawGalaxy() {
            galaxyCtx.clearRect(0, 0, width, height);
            galaxyParticles.forEach(p => {
                galaxyCtx.beginPath();
                galaxyCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                galaxyCtx.fillStyle = `${p.color} ${p.alpha})`;
                galaxyCtx.fill();
            });
        }

        // --- 2. Twinkling Stars ---
        const stars = [];
        function initStars() {
            stars.length = 0;
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 1.5,
                    baseAlpha: Math.random() * 0.5 + 0.3,
                    oscillationSpeed: Math.random() * 0.03 + 0.01,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        function drawStars() {
            starsCtx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.phase += star.oscillationSpeed;
                const alpha = star.baseAlpha + Math.sin(star.phase) * 0.2;
                starsCtx.beginPath();
                starsCtx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                starsCtx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, Math.min(1, alpha))})`;
                starsCtx.fill();
            });
            requestAnimationFrame(drawStars);
        }

        // --- 3. Fireworks System ---
        const colors = [
            '#ff0040', '#ff0080', '#ff00bf', '#ff00ff', 
            '#00ffff', '#00bfff', '#0080ff', '#0040ff', 
            '#ffff00', '#ffbf00', '#ff8000', '#ff4000', 
            '#00ff00', '#80ff00', '#ffffff'
        ];

        class Particle {
            constructor(x, y, color, velocity, angle, isBig) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.alpha = 1;
                // 大烟花消失得慢一点，小烟花快一点
                this.decay = isBig ? (Math.random() * 0.012 + 0.006) : (Math.random() * 0.02 + 0.01); 
                
                const spread = isBig ? 0.5 : 0.2;
                this.vx = Math.cos(angle) * velocity + (Math.random() - 0.5) * spread;
                this.vy = Math.sin(angle) * velocity + (Math.random() - 0.5) * spread;
                
                this.gravity = isBig ? 0.05 : 0.08;
                this.friction = 0.96;
                this.trail = [];
                this.maxTrail = isBig ? 6 : 3;
                this.isBig = isBig;
            }

            update() {
                this.trail.push({x: this.x, y: this.y, alpha: this.alpha});
                if (this.trail.length > this.maxTrail) this.trail.shift();

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw(context) {
                if (this.alpha <= 0) return;

                // Draw Trail
                if (this.trail.length > 1) {
                    context.beginPath();
                    context.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        context.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    const rgb = this.color.match(/\d+/g);
                    context.strokeStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${this.alpha * 0.4})`;
                    context.lineWidth = this.isBig ? 2.5 : 1.5;
                    context.lineCap = 'round';
                    context.stroke();
                }

                // Draw Head
                context.beginPath();
                const radius = this.isBig ? 3 : 1.5;
                context.arc(this.x, this.y, radius, 0, Math.PI * 2);
                const rgb = this.color.match(/\d+/g);
                context.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${this.alpha})`;
                if (this.isBig) {
                    context.shadowColor = this.color;
                    context.shadowBlur = 15;
                }
                context.fill();
                context.shadowBlur = 0;
            }
        }

        class Rocket {
            constructor(targetX, targetY, color, isBig) {
                this.x = Math.random() * width;
                this.y = height;
                this.targetX = targetX || Math.random() * (width * 0.8) + (width * 0.1);
                this.targetY = targetY || Math.random() * (height * 0.35) + (height * 0.1);
                this.color = color || colors[Math.floor(Math.random() * colors.length)];
                this.isBig = isBig; // 标记是大烟花还是背景小烟花
                
                const angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
                // 大烟花速度快，小烟花速度慢
                const speed = isBig ? (13 + Math.random() * 3) : (8 + Math.random() * 2);
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.exploded = false;
                this.particles = [];
                this.trail = [];
            }

            update() {
                if (!this.exploded) {
                    this.trail.push({x: this.x, y: this.y});
                    if (this.trail.length > (this.isBig ? 10 : 5)) this.trail.shift();
                    
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.15; 
                    
                    if (this.vy >= -1 || this.y <= this.targetY) {
                        this.explode();
                    }
                } else {
                    this.particles.forEach(p => p.update());
                    this.particles = this.particles.filter(p => p.alpha > 0.05);
                }
            }

            draw() {
                if (!this.exploded) {
                    if (this.trail.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.trail[0].x, this.trail[0].y);
                        for (let i = 1; i < this.trail.length; i++) {
                            ctx.lineTo(this.trail[i].x, this.trail[i].y);
                        }
                        ctx.strokeStyle = `rgba(255, 255, 255, ${this.isBig ? 0.7 : 0.4})`;
                        ctx.lineWidth = this.isBig ? 3 : 1.5;
                        ctx.lineCap = 'round';
                        ctx.stroke();
                    }
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.isBig ? 3.5 : 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    if (this.isBig) {
                        ctx.shadowColor = '#fff';
                        ctx.shadowBlur = 15;
                    }
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    this.particles.forEach(p => p.draw(ctx));
                }
            }

            explode() {
                this.exploded = true;
                // 大烟花：粒子多，范围大
                // 小烟花：粒子少，范围小，颜色淡
                const count = this.isBig ? 150 : 40;
                const baseVelocity = this.isBig ? 5 : 2.5;
                
                // 如果是小烟花，降低颜色透明度，让它看起来更远
                let displayColor = this.color;
                if (!this.isBig) {
                    const rgb = this.color.match(/\d+/g);
                    displayColor = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.6)`;
                }

                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
                    const velocity = baseVelocity + Math.random() * (this.isBig ? 3 : 1.5);
                    this.particles.push(new Particle(this.x, this.y, displayColor, velocity, angle, this.isBig));
                }
                
                if (this.isBig) {
                    // 大烟花额外加闪光
                    for (let i = 0; i < 40; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const velocity = Math.random() * 6 + 3;
                        this.particles.push(new Particle(this.x, this.y, 'rgb(255, 255, 255)', velocity, angle, true));
                    }
                }
            }

            isDone() {
                return this.exploded && this.particles.length === 0;
            }
        }

        let rockets = [];
        let lastBackgroundFireworkTime = 0;

        function launchBigFirework() {
            // 点击按钮：发射 3 个大烟花
            const count = 3;
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    rockets.push(new Rocket(null, null, null, true));
                }, i * 300);
            }
        }

        function launchBackgroundFirework() {
            // 背景自动：偶尔发射 1 个小烟花
            rockets.push(new Rocket(null, null, null, false));
        }

        function animate(timestamp) {
            // 清空烟花层，保留拖尾效果
            ctx.fillStyle = 'rgba(15, 12, 41, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // 更新烟花
            rockets = rockets.filter(rocket => {
                rocket.update();
                rocket.draw();
                return !rocket.isDone();
            });
            
            // 逻辑：背景自动放烟花 (每 2.5 秒 ~ 4.5 秒 一次)
            if (timestamp - lastBackgroundFireworkTime > 2500 + Math.random() * 2000) {
                launchBackgroundFirework();
                lastBackgroundFireworkTime = timestamp;
            }
            
            requestAnimationFrame(animate);
        }

        // --- Initialization ---
        initGalaxy();
        drawGalaxy(); // 静态绘制银河，不需要每帧重绘，除非需要动态效果
        // 如果需要银河微动，可以把 drawGalaxy() 放入 animate 循环，但为了性能这里静态即可
        
        initStars();
        drawStars(); // 星星动态闪烁

        // Event Listener
        document.getElementById('magicBtn').addEventListener('click', launchBigFirework);

        // Start Loop
        requestAnimationFrame(animate);

    </script>
</body>
</html>

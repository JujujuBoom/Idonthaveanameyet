<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julie's Website - Beautiful Fireworks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }
        .container { 
            text-align: center; 
            z-index: 10; 
            position: relative;
        }
        h1 {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.4);
            margin-bottom: 2rem;
            animation: glow 2s ease-in-out infinite alternate;
            pointer-events: none;
            user-select: none;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.4); }
            to { text-shadow: 0 0 30px rgba(255, 105, 180, 1), 0 0 60px rgba(255, 105, 180, 0.6), 0 0 80px rgba(255, 105, 180, 0.4); }
        }
        .firework-btn {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 25px rgba(255, 107, 107, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .firework-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 35px rgba(255, 107, 107, 0.6);
        }
        .firework-btn:active {
            transform: translateY(1px) scale(0.98);
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #stars { z-index: 1; }
        #fireworks { z-index: 5; }
        .footer {
            position: fixed;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            z-index: 10;
            pointer-events: none;
            user-select: none;
        }
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .firework-btn { padding: 0.8rem 2rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>
    <canvas id="fireworks"></canvas>
    
    <div class="container">
        <h1>This is Julie's Website</h1>
        <button class="firework-btn" id="magicBtn">🎆 Click for Magic</button>
    </div>
    
    <div class="footer">Made with ❤️ for Julie</div>

    <script>
        // --- Setup ---
        const starsCanvas = document.getElementById('stars');
        const starsCtx = starsCanvas.getContext('2d');
        const fireworksCanvas = document.getElementById('fireworks');
        const ctx = fireworksCanvas.getContext('2d');
        
        let width = starsCanvas.width = fireworksCanvas.width = window.innerWidth;
        let height = starsCanvas.height = fireworksCanvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = starsCanvas.width = fireworksCanvas.width = window.innerWidth;
            height = starsCanvas.height = fireworksCanvas.height = window.innerHeight;
            initStars();
        });

        // --- Twinkling Stars Background ---
        const stars = [];
        function initStars() {
            stars.length = 0;
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 1.5,
                    baseAlpha: Math.random() * 0.5 + 0.3,
                    oscillationSpeed: Math.random() * 0.03 + 0.01,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        function drawStars() {
            starsCtx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.phase += star.oscillationSpeed;
                const alpha = star.baseAlpha + Math.sin(star.phase) * 0.2;
                starsCtx.beginPath();
                starsCtx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                starsCtx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, Math.min(1, alpha))})`;
                starsCtx.fill();
            });
            requestAnimationFrame(drawStars);
        }
        
        initStars();
        drawStars();

        // --- Classic Beautiful Fireworks ---
        
        // 漂亮的配色方案
        const colors = [
            '#ff0040', '#ff0080', '#ff00bf', '#ff00ff', // Pinks/Reds
            '#00ffff', '#00bfff', '#0080ff', '#0040ff', // Blues/Cyans
            '#ffff00', '#ffbf00', '#ff8000', '#ff4000', // Yellows/Oranges
            '#00ff00', '#80ff00', '#bfff00',            // Greens
            '#ffffff'                                   // White
        ];

        class Particle {
            constructor(x, y, color, velocity, angle) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.008; // Random fade speed
                
                // Spread velocity slightly for natural look
                const spread = Math.random() * 0.5; 
                this.vx = Math.cos(angle) * velocity + (Math.random() - 0.5) * spread;
                this.vy = Math.sin(angle) * velocity + (Math.random() - 0.5) * spread;
                
                this.gravity = 0.04;
                this.friction = 0.96;
                
                // Trail history
                this.trail = [];
                this.maxTrail = 5;
            }

            update() {
                this.trail.push({x: this.x, y: this.y, alpha: this.alpha});
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw(context) {
                if (this.alpha <= 0) return;

                // Draw Trail
                if (this.trail.length > 1) {
                    context.beginPath();
                    context.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        context.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    // Gradient stroke for trail
                    const gradient = context.createLinearGradient(
                        this.trail[0].x, this.trail[0].y, 
                        this.x, this.y
                    );
                    gradient.addColorStop(0, `rgba(0,0,0,0)`);
                    gradient.addColorStop(1, this.color.replace(')', `, ${this.alpha * 0.5})`).replace('rgb', 'rgba'));
                    
                    context.strokeStyle = gradient;
                    context.lineWidth = 2;
                    context.lineCap = 'round';
                    context.stroke();
                }

                // Draw Head
                context.beginPath();
                context.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
                context.fillStyle = this.color.replace(')', `, ${this.alpha})`).replace('rgb', 'rgba');
                context.shadowColor = this.color;
                context.shadowBlur = 10;
                context.fill();
                context.shadowBlur = 0; // Reset
            }
        }

        class Rocket {
            constructor(targetX, targetY, color) {
                this.x = Math.random() * width;
                this.y = height;
                this.targetX = targetX || Math.random() * (width * 0.8) + (width * 0.1);
                this.targetY = targetY || Math.random() * (height * 0.4) + (height * 0.1);
                this.color = color || colors[Math.floor(Math.random() * colors.length)];
                
                const angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
                const speed = 12 + Math.random() * 3;
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.exploded = false;
                this.particles = [];
                this.trail = [];
            }

            update() {
                if (!this.exploded) {
                    this.trail.push({x: this.x, y: this.y});
                    if (this.trail.length > 8) this.trail.shift();
                    
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.15; // Gravity pulling up slower
                    
                    // Explode when reaching peak or target area
                    if (this.vy >= -2 || this.y <= this.targetY) {
                        this.explode();
                    }
                } else {
                    this.particles.forEach(p => p.update());
                    this.particles = this.particles.filter(p => p.alpha > 0.05);
                }
            }

            draw() {
                if (!this.exploded) {
                    // Draw Rocket Trail
                    if (this.trail.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.trail[0].x, this.trail[0].y);
                        for (let i = 1; i < this.trail.length; i++) {
                            ctx.lineTo(this.trail[i].x, this.trail[i].y);
                        }
                        ctx.strokeStyle = `rgba(255, 255, 255, 0.6)`;
                        ctx.lineWidth = 3;
                        ctx.lineCap = 'round';
                        ctx.stroke();
                    }
                    
                    // Draw Rocket Head
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.shadowColor = '#fff';
                    ctx.shadowBlur = 15;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    this.particles.forEach(p => p.draw(ctx));
                }
            }

            explode() {
                this.exploded = true;
                const particleCount = 120; // Lots of particles for full look
                const baseVelocity = 4 + Math.random() * 3;
                
                for (let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 * i) / particleCount;
                    // Slight random variation in velocity for organic feel
                    const velocity = baseVelocity + Math.random() * 2; 
                    this.particles.push(new Particle(this.x, this.y, this.color, velocity, angle));
                }
                
                // Add some "sparkle" particles (white/silver)
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = Math.random() * 5 + 2;
                    this.particles.push(new Particle(this.x, this.y, 'rgb(255, 255, 255)', velocity, angle));
                }
            }

            isDone() {
                return this.exploded && this.particles.length === 0;
            }
        }

        let rockets = [];

        function launchFireworks() {
            // Launch 3-5 rockets at once
            const count = Math.floor(Math.random() * 3) + 3;
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    rockets.push(new Rocket());
                }, i * 200);
            }
        }

        function animate() {
            // Create motion blur trail effect
            ctx.fillStyle = 'rgba(15, 12, 41, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // Use filter to safely remove finished rockets
            rockets = rockets.filter(rocket => {
                rocket.update();
                rocket.draw();
                return !rocket.isDone();
            });
            
            // Random automatic launches
            if (Math.random() < 0.03) {
                rockets.push(new Rocket());
            }
            
            requestAnimationFrame(animate);
        }

        // Event Listener
        document.getElementById('magicBtn').addEventListener('click', launchFireworks);

        // Initial Auto Launch
        setTimeout(() => {
            rockets.push(new Rocket());
            setTimeout(() => rockets.push(new Rocket()), 500);
        }, 800);

        animate();
    </script>
</body>
</html>

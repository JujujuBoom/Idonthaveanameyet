<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julie's Website - Galaxy & Fireworks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 深邃夜空背景 */
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }
        .container { 
            text-align: center; 
            z-index: 10; 
            position: relative;
        }
        h1 {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 0 40px rgba(100, 200, 255, 0.4);
            margin-bottom: 2rem;
            animation: glow 3s ease-in-out infinite alternate;
            pointer-events: none;
            user-select: none;
            letter-spacing: 2px;
        }
        @keyframes glow {
            from { text-shadow: 0 0 15px rgba(255, 255, 255, 0.5), 0 0 30px rgba(100, 200, 255, 0.3); }
            to { text-shadow: 0 0 25px rgba(255, 255, 255, 0.8), 0 0 50px rgba(100, 200, 255, 0.6), 0 0 70px rgba(255, 255, 255, 0.4); }
        }
        .firework-btn {
            padding: 1rem 3.5rem;
            font-size: 1.3rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 300;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .firework-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.8);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.4), 0 0 80px rgba(100, 200, 255, 0.2);
        }
        .firework-btn:active {
            transform: translateY(1px) scale(0.98);
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        /* 合并为一个Canvas以简化渲染并避免层级问题 */
        #mainCanvas { z-index: 5; }
        
        .footer {
            position: fixed;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            z-index: 10;
            pointer-events: none;
            user-select: none;
            letter-spacing: 1px;
        }
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .firework-btn { padding: 0.8rem 2.5rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <!-- 只保留一个主Canvas，所有东西都在上面画，避免层级混乱 -->
    <canvas id="mainCanvas"></canvas>
    
    <div class="container">
        <h1>This is Julie's Website</h1>
        <button class="firework-btn" id="magicBtn">✨ Make a Wish</button>
    </div>
    
    <div class="footer">Made with ❤️ for Julie</div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initGalaxy();
            initStars();
        });

        // --- 配置参数 ---
        const CONFIG = {
            starCount: 200,
            galaxyCount: 1500,
            bgFireworkChance: 0.008, // 每帧产生背景烟花的概率 (约每2秒一个)
            maxBgFireworks: 2,       // 同时存在的背景烟花最大数量
            colors: [
                '#ff0040', '#ff0080', '#ff00bf', '#ff00ff', 
                '#00ffff', '#00bfff', '#0080ff', '#0040ff', 
                '#ffff00', '#ffbf00', '#ff8000', '#ff4000', 
                '#00ff00', '#80ff00', '#ffffff'
            ]
        };

        // --- 数据状态 ---
        let stars = [];
        let galaxyParticles = [];
        let rockets = [];
        let lastTime = 0;
        let bgFireworkTimer = 0;

        // --- 1. 初始化银河 ---
        function initGalaxy() {
            galaxyParticles = [];
            for (let i = 0; i < CONFIG.galaxyCount; i++) {
                const x = Math.random() * width;
                const centerX = width / 2;
                const distFromCenter = Math.abs(x - centerX);
                const maxDist = width * 0.8;
                
                // 银河形状算法
                const spread = (distFromCenter / maxDist) * (height * 0.5) + 50;
                const centerY = height / 2 + Math.sin((x / width) * Math.PI * 2 - Math.PI/2) * (height * 0.15);
                
                const y = centerY + (Math.random() - 0.5) * spread;
                
                // 只有落在带内的才保留
                if (Math.abs(y - centerY) < spread / 2) {
                    galaxyParticles.push({
                        x: x,
                        y: y,
                        size: Math.random() * 1.5,
                        alpha: Math.random() * 0.5 + 0.1,
                        blue: 200 + Math.random() * 55,
                        red: 200 + Math.random() * 55
                    });
                }
            }
        }

        // --- 2. 初始化星星 ---
        function initStars() {
            stars = [];
            for (let i = 0; i < CONFIG.starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 1.5,
                    baseAlpha: Math.random() * 0.5 + 0.3,
                    oscillationSpeed: Math.random() * 0.03 + 0.01,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        // --- 3. 烟花类 ---
        class Particle {
            constructor(x, y, color, velocity, angle, isBig) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.alpha = 1;
                this.decay = isBig ? (Math.random() * 0.012 + 0.006) : (Math.random() * 0.025 + 0.015); 
                
                const spread = isBig ? 0.5 : 0.2;
                this.vx = Math.cos(angle) * velocity + (Math.random() - 0.5) * spread;
                this.vy = Math.sin(angle) * velocity + (Math.random() - 0.5) * spread;
                
                this.gravity = isBig ? 0.05 : 0.08;
                this.friction = 0.96;
                this.trail = [];
                this.maxTrail = isBig ? 6 : 3;
                this.isBig = isBig;
            }

            update() {
                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > this.maxTrail) this.trail.shift();

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw(context) {
                if (this.alpha <= 0) return;

                // 绘制拖尾
                if (this.trail.length > 1) {
                    context.beginPath();
                    context.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        context.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    const rgb = this.color.match(/\d+/g);
                    context.strokeStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${this.alpha * 0.4})`;
                    context.lineWidth = this.isBig ? 2.5 : 1.5;
                    context.lineCap = 'round';
                    context.stroke();
                }

                // 绘制粒子头
                context.beginPath();
                const radius = this.isBig ? 3 : 1.5;
                context.arc(this.x, this.y, radius, 0, Math.PI * 2);
                const rgb = this.color.match(/\d+/g);
                context.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${this.alpha})`;
                if (this.isBig) {
                    context.shadowColor = this.color;
                    context.shadowBlur = 15;
                }
                context.fill();
                context.shadowBlur = 0;
            }
        }

        class Rocket {
            constructor(targetX, targetY, color, isBig) {
                this.x = Math.random() * width;
                this.y = height;
                this.targetX = targetX || Math.random() * (width * 0.8) + (width * 0.1);
                this.targetY = targetY || Math.random() * (height * 0.35) + (height * 0.1);
                this.color = color || CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
                this.isBig = isBig;
                
                const angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
                const speed = isBig ? (13 + Math.random() * 3) : (8 + Math.random() * 2);
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.exploded = false;
                this.particles = [];
                this.trail = [];
            }

            update() {
                if (!this.exploded) {
                    this.trail.push({x: this.x, y: this.y});
                    if (this.trail.length > (this.isBig ? 10 : 5)) this.trail.shift();
                    
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.15; 
                    
                    if (this.vy >= -1 || this.y <= this.targetY) {
                        this.explode();
                    }
                } else {
                    this.particles.forEach(p => p.update());
                    // 关键修复：过滤掉消失的粒子，防止内存泄漏
                    this.particles = this.particles.filter(p => p.alpha > 0.05);
                }
            }

            draw() {
                if (!this.exploded) {
                    if (this.trail.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.trail[0].x, this.trail[0].y);
                        for (let i = 1; i < this.trail.length; i++) {
                            ctx.lineTo(this.trail[i].x, this.trail[i].y);
                        }
                        ctx.strokeStyle = `rgba(255, 255, 255, ${this.isBig ? 0.7 : 0.4})`;
                        ctx.lineWidth = this.isBig ? 3 : 1.5;
                        ctx.lineCap = 'round';
                        ctx.stroke();
                    }
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.isBig ? 3.5 : 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    if (this.isBig) {
                        ctx.shadowColor = '#fff';
                        ctx.shadowBlur = 15;
                    }
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    this.particles.forEach(p => p.draw(ctx));
                }
            }

            explode() {
                this.exploded = true;
                const count = this.isBig ? 150 : 40;
                const baseVelocity = this.isBig ? 5 : 2.5;
                
                let displayColor = this.color;
                if (!this.isBig) {
                    const rgb = this.color.match(/\d+/g);
                    displayColor = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.6)`;
                }

                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
                    const velocity = baseVelocity + Math.random() * (this.isBig ? 3 : 1.5);
                    this.particles.push(new Particle(this.x, this.y, displayColor, velocity, angle, this.isBig));
                }
                
                if (this.isBig) {
                    for (let i = 0; i < 40; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const velocity = Math.random() * 6 + 3;
                        this.particles.push(new Particle(this.x, this.y, 'rgb(255, 255, 255)', velocity, angle, true));
                    }
                }
            }

            isDone() {
                return this.exploded && this.particles.length === 0;
            }
        }

        // --- 主循环 ---
        function animate(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            // 1. 清空画布 (带一点拖尾效果)
            ctx.fillStyle = 'rgba(9, 10, 15, 0.3)'; 
            ctx.fillRect(0, 0, width, height);

            // 2. 绘制银河 (静态但每帧重绘以确保显示)
            galaxyParticles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${p.red}, ${p.blue}, 255, ${p.alpha})`;
                ctx.fill();
            });

            // 3. 绘制闪烁星星
            stars.forEach(star => {
                star.phase += star.oscillationSpeed;
                const alpha = star.baseAlpha + Math.sin(star.phase) * 0.2;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, Math.min(1, alpha))})`;
                ctx.fill();
            });

            // 4. 更新和绘制烟花
            // 关键修复：使用 filter 彻底移除完成的火箭，防止数组无限增长
            rockets = rockets.filter(rocket => {
                rocket.update();
                rocket.draw();
                return !rocket.isDone();
            });

            // 5. 自动生成背景烟花 (带限流)
            // 只有当背景烟花数量少于限制时才生成
            const currentBgFireworks = rockets.filter(r => !r.isBig).length;
            if (currentBgFireworks < CONFIG.maxBgFireworks) {
                bgFireworkTimer += deltaTime;
                // 随机间隔 2~4 秒
                if (bgFireworkTimer > 2000 + Math.random() * 2000) {
                    rockets.push(new Rocket(null, null, null, false));
                    bgFireworkTimer = 0;
                }
            }

            requestAnimationFrame(animate);
        }

        // --- 交互 ---
        function launchBigFirework() {
            // 点击按钮：发射 3 个大烟花
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    rockets.push(new Rocket(null, null, null, true));
                }, i * 300);
            }
        }

        document.getElementById('magicBtn').addEventListener('click', launchBigFirework);

        // --- 启动 ---
        initGalaxy();
        initStars();
        requestAnimationFrame(animate);

    </script>
</body>
</html>

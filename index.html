<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julie's Website</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .container { text-align: center; z-index: 10; }
        h1 {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.4);
            margin-bottom: 2rem;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.4); }
            to { text-shadow: 0 0 30px rgba(255, 105, 180, 1), 0 0 60px rgba(255, 105, 180, 0.6), 0 0 80px rgba(255, 105, 180, 0.4); }
        }
        .firework-btn {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 25px rgba(255, 107, 107, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .firework-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 35px rgba(255, 107, 107, 0.6);
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #stars { z-index: 1; }
        #fireworks { z-index: 5; }
        .footer {
            position: fixed;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>
    <canvas id="fireworks"></canvas>
    <div class="container">
        <h1>This is Julie's website</h1>
        <button class="firework-btn" onclick="launchFireworks()">🎆 Click for Magic</button>
    </div>
    <div class="footer">Made with ❤️ for Julie</div>
    <script>
        // Canvas setup
        const starsCanvas = document.getElementById('stars');
        const starsCtx = starsCanvas.getContext('2d');
        const fireworksCanvas = document.getElementById('fireworks');
        const ctx = fireworksCanvas.getContext('2d');
        let width = starsCanvas.width = fireworksCanvas.width = window.innerWidth;
        let height = starsCanvas.height = fireworksCanvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = starsCanvas.width = fireworksCanvas.width = window.innerWidth;
            height = starsCanvas.height = fireworksCanvas.height = window.innerHeight;
            drawStars();
        });

        // Twinkling stars
        function drawStars() {
            starsCtx.clearRect(0, 0, width, height);
            for (let i = 0; i < 300; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const radius = Math.random() * 1.5;
                const alpha = Math.random() * 0.5 + 0.5;
                starsCtx.beginPath();
                starsCtx.arc(x, y, radius, 0, Math.PI * 2);
                starsCtx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                starsCtx.fill();
            }
        }
        drawStars();
        setInterval(drawStars, 2000); // Twinkle effect

        // Fireworks
        class Rocket {
            constructor() {
                this.x = width / 2 + (Math.random() - 0.5) * 200; // Spread from center
                this.y = height; // Start at bottom
                this.vy = -(Math.random() * 5 + 12); // Upward speed
                this.explosionHeight = Math.random() * (height / 3) + height / 6; // Burst in upper area
                this.color = ['#ff6b6b', '#feca57', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3'][Math.floor(Math.random() * 6)];
                this.exploded = false;
                this.particles = [];
            }
            update() {
                if (!this.exploded) {
                    this.y += this.vy;
                    if (this.y <= this.explosionHeight) {
                        this.explode();
                    }
                } else {
                    this.particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.1; // Gravity
                        p.alpha -= p.decay;
                    });
                    this.particles = this.particles.filter(p => p.alpha > 0);
                }
            }
            draw() {
                if (!this.exploded) {
                    // Draw rocket trail
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x, this.y + 15); // Tail
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    this.particles.forEach(p => {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                        ctx.fillStyle = `${p.color}${Math.floor(p.alpha * 255).toString(16).padStart(2, '0')}`;
                        ctx.fill();
                    });
                }
            }
            explode() {
                this.exploded = true;
                for (let i = 0; i < 100; i++) {
                    this.particles.push({
                        x: this.x, y: this.y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10 - 2, // Slight upward burst
                        color: this.color,
                        alpha: 1,
                        decay: Math.random() * 0.02 + 0.015
                    });
                }
            }
            isDone() {
                return this.exploded && this.particles.length === 0;
            }
        }

        let rockets = [];

        function launchFireworks() {
            for (let i = 0; i < 3; i++) { // Launch 3 rockets per click
                setTimeout(() => rockets.push(new Rocket()), i * 200);
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height); // Clear without fade for cleaner look
            rockets.forEach((rocket, index) => {
                rocket.update();
                rocket.draw();
                if (rocket.isDone()) rockets.splice(index, 1);
            });
            if (Math.random() < 0.01) { // Occasional random launch
                rockets.push(new Rocket());
            }
            requestAnimationFrame(animate);
        }
        animate();

        // Initial launches after page load
        setTimeout(() => {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => rockets.push(new Rocket()), i * 200);
            }
        }, 500);
    </script>
</body>
</html>
